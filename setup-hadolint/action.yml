name: 'Setup hadolint'
description: 'Installs hadolint to tools/'

inputs:
  version:
    description: "The hadolint release version to install (e.g., v2.12.0)"
    required: false
    default: "latest"
  architecture:
    description: "The system architecture (e.g., x86_64, arm64). If not set, it will be detected automatically."
    required: false
    default: ""
  base_path:
    description: "The base path to install hadolint (default: CWD)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Make tools directory
      shell: bash
      run: mkdir -p "${{ inputs.base_path }}/tools"
    - name: Install hadolint
      shell: bash
      run: |
        # Determine architecture if not provided
        arch="${{ inputs.architecture }}"
        if [ -z "$arch" ]; then
          arch=$(uname -m)
        fi

        # Map architecture names to hadolint naming conventions
        if [ "$arch" = "amd64" ]; then
            arch="x86_64"
        elif [ "$arch" = "aarch64" ]; then
            arch="arm64"
        fi

        release_url="https://github.com/hadolint/hadolint/releases/${{ inputs.version }}/download"
        dest="${{ inputs.base_path }}/tools"

        # v2.13.0+ uses lowercase "linux"; older releases use "Linux"
        binary="hadolint-linux-${arch}"
        if ! curl -fsSL "${release_url}/${binary}" -o "${dest}/${binary}" 2>/dev/null; then
            binary="hadolint-Linux-${arch}"
            curl -fsSL "${release_url}/${binary}" -o "${dest}/${binary}"
        fi

        curl -fsSL "${release_url}/${binary}.sha256" -o "${dest}/${binary}.sha256"
        (cd "${dest}" && sha256sum -c "${binary}.sha256")
        rm -f "${dest}/${binary}.sha256"

        mv "${dest}/${binary}" "${dest}/hadolint"
        chmod +rx "${dest}/hadolint"
