name: 'Setup Bakery'
description: "Installs Posit Bakery tool in Github Actions CI"

inputs:
  version:
    description: "The version of the Posit Bakery tool to install"
    required: false
    default: "main"
  python-version:
    description: "The version of Python to use"
    required: false
    default: "3.x"

runs:
  using: "composite"
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      with:
        enable-cache: false

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: "${{ inputs.python-version }}"

    - name: Install Bakery
      shell: bash
      run: |
        uv tool install "git+https://github.com/posit-dev/images-shared.git@${{ inputs.version }}#subdirectory=posit-bakery&egg=posit-bakery"
