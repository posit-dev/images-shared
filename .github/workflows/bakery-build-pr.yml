# Fork-safe PR build workflow for Posit container images.
#
# Fork PRs stay load-only and never push: they get a read-only GITHUB_TOKEN
# with no access to repo secrets, so registry logins and caching are skipped.
# Same-repo PRs push a temporary multi-arch index to ghcr.io/<owner> (by
# digest per-platform, then assembled with `bakery ci merge --index-only`) so
# maintainers can pull and debug the built image when tests fail. PRs never
# push to the final/release registries.
#
# Registry logins and caching are conditional on the PR source.
#
# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

name: Bakery PR Build

on:
  workflow_call:
    inputs:
      version:
        description: "Bakery version to install"
        default: "main"
        required: false
        type: string
      context:
        description: "Path to the bakery context"
        default: "."
        required: false
        type: string
      dev-versions:
        description: "Whether to include development versions [default: exclude]"
        default: "exclude"
        required: false
        type: string
      matrix-versions:
        description: "Whether to include matrix versions [default: exclude]"
        default: "exclude"
        required: false
        type: string
      retry:
        description: "Number of times to retry a failed build"
        default: 1
        required: false
        type: number
      cache:
        description: "Whether to use registry caching for builds [default: true]"
        default: true
        required: false
        type: boolean
      amd64-builder:
        description: "Runner label for amd64 builds"
        default: "ubuntu-latest-4x"
        required: false
        type: string
      arm64-builder:
        description: "Runner label for arm64 builds"
        default: "ubuntu-24.04-arm64-4-core"
        required: false
        type: string
    # NO secrets section — only inherited GITHUB_TOKEN

defaults:
  run:
    shell: bash

jobs:
  detect:
    name: Detect Fork
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      is-fork: ${{ steps.check.outputs.is-fork }}
    steps:
      - name: Check fork status
        id: check
        env:
          IS_FORK: ${{ github.event.pull_request.head.repo.fork == true }}
        run: echo "is-fork=$IS_FORK" >> "$GITHUB_OUTPUT"

  matrix:
    name: Image Matrix
    needs: detect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      platform-matrix: ${{ steps.images-by-platform.outputs.platform_matrix }}
      versions-matrix: ${{ steps.images-by-version.outputs.versions_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Images by Version/Platform
        id: images-by-platform
        env:
          IS_FORK: ${{ needs.detect.outputs.is-fork }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          BAKERY_CONTEXT: ${{ inputs.context }}
        run: |
          FULL_MATRIX=$(bakery ci matrix --quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" --context "$BAKERY_CONTEXT" | jq --compact-output .)
          if [ "$IS_FORK" = "true" ]; then
            # Skip arm64 for fork PRs — paid runners may not be available
            FULL_MATRIX=$(echo "$FULL_MATRIX" | jq --compact-output '[.[] | select(.platform != "linux/arm64")]')
          fi
          echo "platform_matrix=$FULL_MATRIX" >> "$GITHUB_OUTPUT"

      - name: Images by Version
        id: images-by-version
        env:
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          BAKERY_CONTEXT: ${{ inputs.context }}
        run: |
          result=$(bakery ci matrix --quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" --exclude platform --context "$BAKERY_CONTEXT")
          echo "versions_matrix=$(echo "$result" | jq --compact-output .)" >> "$GITHUB_OUTPUT"

  build-test:
    name: "Build/Test ${{ matrix.img.image }}:${{ matrix.img.version }} (${{ matrix.img.platform }})"
    needs:
      - detect
      - matrix
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.platform-matrix) }}
    runs-on: ${{ matrix.img.platform == 'linux/arm64' && inputs.arm64-builder || inputs.amd64-builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Set up Docker
        uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db  # v5.1.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0

      - name: Login to GitHub Container Registry
        if: needs.detect.outputs.is-fork != 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize platform
        id: normalize-platform
        env:
          BUILD_PLATFORM: ${{ matrix.img.platform }}
        run: |
          PLATFORM=${BUILD_PLATFORM#linux/}
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          IS_FORK: ${{ needs.detect.outputs.is-fork }}
          GIT_SHA: ${{ github.sha }}
          RETRY: ${{ inputs.retry }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          IMAGE_PLATFORM: ${{ matrix.img.platform }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          BAKERY_CONTEXT: ${{ inputs.context }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          NORMALIZED_PLATFORM: ${{ steps.normalize-platform.outputs.platform }}
          CACHE: ${{ inputs.cache }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$IS_FORK" = "true" ]; then
            # Fork PRs: load-only, no push, no temp registry. Cache only when
            # explicitly enabled (forks have no registry credentials anyway).
            CACHE_FLAGS=()
            if [ "$CACHE" = "true" ]; then
              CACHE_FLAGS=(--cache-registry "ghcr.io/${REGISTRY_OWNER}")
            fi
            bakery build \
              --strategy build --pull --load \
              --retry "$RETRY" \
              --image-name "^${IMAGE_NAME}$" \
              --image-version "$IMAGE_VERSION" \
              --image-platform "$IMAGE_PLATFORM" \
              --dev-versions "$DEV_VERSIONS" \
              --matrix-versions "$MATRIX_VERSIONS" \
              "${CACHE_FLAGS[@]}" \
              --context "$BAKERY_CONTEXT"
          else
            # Same-repo PRs: push by digest per-platform to the temp registry so
            # the merge job can assemble a multi-arch index (no --temp-tagged).
            bakery build \
              --strategy build --pull --push \
              --retry "$RETRY" \
              --image-name "^${IMAGE_NAME}$" \
              --image-version "$IMAGE_VERSION" \
              --image-platform "$IMAGE_PLATFORM" \
              --dev-versions "$DEV_VERSIONS" \
              --matrix-versions "$MATRIX_VERSIONS" \
              --cache-registry "ghcr.io/${REGISTRY_OWNER}" \
              --temp-registry "ghcr.io/${REGISTRY_OWNER}" \
              --metadata-file "./${IMAGE_NAME}-${IMAGE_VERSION}-${NORMALIZED_PLATFORM}-metadata.json" \
              --context "$BAKERY_CONTEXT"
          fi

      - name: Test
        env:
          IS_FORK: ${{ needs.detect.outputs.is-fork }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          IMAGE_PLATFORM: ${{ matrix.img.platform }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          NORMALIZED_PLATFORM: ${{ steps.normalize-platform.outputs.platform }}
          BAKERY_CONTEXT: ${{ inputs.context }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DGOSS_ARGS=(
            --image-name "^${IMAGE_NAME}$"
            --image-version "$IMAGE_VERSION"
            --image-platform "$IMAGE_PLATFORM"
            --dev-versions "$DEV_VERSIONS"
            --matrix-versions "$MATRIX_VERSIONS"
            --context "$BAKERY_CONTEXT"
          )
          if [ "$IS_FORK" != "true" ]; then
            # Same-repo PRs pushed by digest; resolve via the build metadata.
            DGOSS_ARGS+=(--metadata-file "./${IMAGE_NAME}-${IMAGE_VERSION}-${NORMALIZED_PLATFORM}-metadata.json")
          fi
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss "${DGOSS_ARGS[@]}"

      - name: Upload Metadata
        if: needs.detect.outputs.is-fork != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: "${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata"
          path: "./${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata.json"
          overwrite: 'true'

  merge:
    name: "Merge (temp index)"
    if: ${{ needs.detect.outputs.is-fork != 'true' }}
    permissions:
      contents: read
      packages: write
    needs:
      - detect
      - build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Set up Docker
        uses: docker/setup-docker-action@b2189fbf2a6592b51fee7cdd93ee2bfaeba733db  # v5.1.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0

      - name: Download Metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "*-metadata"
          merge-multiple: true

      - name: Merge index (temp)
        env:
          BAKERY_CONTEXT: ${{ inputs.context }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
        run: |
          bakery ci merge \
            --context "$BAKERY_CONTEXT" \
            --temp-registry "ghcr.io/${REGISTRY_OWNER}" \
            --index-only \
            ./*-metadata.json

      - name: Build Artifact Summary
        env:
          BAKERY_CONTEXT: ${{ inputs.context }}
          REGISTRY_OWNER: ${{ github.repository_owner }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
        run: |
          bakery ci summary \
            --mode temp \
            --temp-registry "ghcr.io/${REGISTRY_OWNER}" \
            --context "$BAKERY_CONTEXT" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            --output summary.md
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
