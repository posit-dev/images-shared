name: clean.yml
on:
  workflow_call:
    inputs:
      version:
        description: "The version of the Posit Bakery tool to install"
        default: "main"
        required: false
        type: string
      context:
        description: "The Bakery context to use (directory)"
        default: "."
        required: false
        type: string
      clean-caches:
        description: "Whether to clean caches [default: true]"
        default: true
        required: false
        type: boolean
      remove-dangling-caches:
        description: "Remove untagged caches from registries [default: true]"
        default: true
        required: false
        type: boolean
      remove-caches-older-than:
        description: "Remove caches older than this number of days [default: 14]"
        default: 14
        required: false
        type: number
      clean-temporary-images:
        description: "Whether to clean temporary images [default: true]"
        default: true
        required: false
        type: boolean
      remove-dangling-temporary-images:
        description: "Remove untagged temporary images from registries [default: false]"
        default: false
        required: false
        type: boolean
      remove-temporary-images-older-than:
        description: "Remove temporary images older than this number of days [default: 3]"
        default: 3
        required: false
        type: number
      dev-versions:
        description: "Dev version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      matrix-versions:
        description: "Matrix version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      dry-run:
        description: "Perform a dry run without deleting any caches [default: false]"
        default: false
        required: false
        type: boolean
    secrets:
      DOCKER_HUB_ACCESS_TOKEN:
        description: "Docker Hub Access Token [required if pushing]"
        required: false

defaults:
  run:
    shell: bash

# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

permissions: {}

jobs:
  clean-caches:
    name: Clean Caches
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      packages: write
    if: ${{ inputs.clean-caches == true }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean caches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          CONTEXT: ${{ inputs.context }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DRY_RUN: ${{ inputs.dry-run }}
          REMOVE_DANGLING: ${{ inputs.remove-dangling-caches }}
          OLDER_THAN: ${{ inputs.remove-caches-older-than }}
        run: |
          DRY_RUN_FLAG=""; if [ "$DRY_RUN" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          UNTAGGED_FLAG="--no-untagged"; if [ "$REMOVE_DANGLING" = "true" ]; then UNTAGGED_FLAG="--untagged"; fi
          OLDER_FLAG=""; if [ "$OLDER_THAN" -gt 0 ] 2>/dev/null; then OLDER_FLAG="--older-than $OLDER_THAN"; fi
          bakery clean cache-registry "$REGISTRY" \
            --context "$CONTEXT" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            $DRY_RUN_FLAG \
            $UNTAGGED_FLAG \
            $OLDER_FLAG

  clean-temp:
    name: Clean Temporary Images
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      packages: write
    if: ${{ inputs.clean-temporary-images == true }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean temporary images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          CONTEXT: ${{ inputs.context }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DRY_RUN: ${{ inputs.dry-run }}
          REMOVE_DANGLING: ${{ inputs.remove-dangling-temporary-images }}
          OLDER_THAN: ${{ inputs.remove-temporary-images-older-than }}
        run: |
          DRY_RUN_FLAG=""; if [ "$DRY_RUN" = "true" ]; then DRY_RUN_FLAG="--dry-run"; fi
          UNTAGGED_FLAG="--no-untagged"; if [ "$REMOVE_DANGLING" = "true" ]; then UNTAGGED_FLAG="--untagged"; fi
          OLDER_FLAG=""; if [ "$OLDER_THAN" -gt 0 ] 2>/dev/null; then OLDER_FLAG="--older-than $OLDER_THAN"; fi
          bakery clean temp-registry "$REGISTRY" \
            --context "$CONTEXT" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            $DRY_RUN_FLAG \
            $UNTAGGED_FLAG \
            $OLDER_FLAG
