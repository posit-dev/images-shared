#
# Worklows can only be nested four levels deep.
# This workflow will be called to build individual images so should be kept
# as shallow as possible.

# Note: SOCI conversion is intentionally not wired into this workflow.
# Unlike bakery-build-native.yml, this QEMU-based workflow has no
# separate merge phase to inject SOCI between. Product repos that need
# SOCI should use bakery-build-native.yml instead. See
# docs/superpowers/specs/2026-05-18-soci-indexing-design.md.

name: Bakery

on:
  workflow_call:
    inputs:
      version:
        description: "The version of the Posit Bakery tool to install"
        default: "main"
        required: false
        type: string
      context:
        description: "The Bakery context to use (directory)"
        default: "."
        required: false
        type: string
      dev-versions:
        description: "Dev version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      matrix-versions:
        description: "Matrix version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      image-version:
        description: "Filter to a specific image version. A leading 'v' is stripped automatically."
        default: ""
        required: false
        type: string
      dev-channel:
        description: "Filter dev versions to a specific release channel (e.g. 'daily', 'preview')"
        default: ""
        required: false
        type: string
      dev-stream:
        description: "Deprecated: use dev-channel instead."
        default: ""
        required: false
        type: string
      dev-version:
        description: "Pinned dev version string for a dispatched build. Used with dev-channel to construct dev-spec."
        default: ""
        required: false
        type: string
      dev-spec:
        description: "JSON spec for a dispatched dev build. If set, takes precedence over dev-version/dev-channel for spec construction."
        default: ""
        required: false
        type: string
      push:
        description: "Whether to push images to registries [default: false]"
        default: false
        required: false
        type: boolean
      retry:
        description: "Number of times to retry a failed build [default: 1]"
        default: 1
        required: false
        type: number
      cache:
        description: "Whether to use registry caching for builds [default: true]"
        default: true
        required: false
        type: boolean
      runs-on:
        description: "The type of runner to use [default: ubuntu-latest]"
        default: "ubuntu-latest"
        required: false
        type: string
      aws-region:
        description: "AWS Region [default: us-east-2]"
        default: "us-east-2"
        required: false
        type: string
    secrets:
      DOCKER_HUB_ACCESS_TOKEN:
        description: "Docker Hub Access Token [required if pushing to Docker Hub]"
        required: false
      DOCKER_HUB_README_USERNAME:
        description: "Docker Hub username for pushing READMEs (PAT required, OAT not supported)"
        required: false
      DOCKER_HUB_README_PASSWORD:
        description: "Docker Hub PAT for pushing READMEs"
        required: false
      AWS_ROLE:
        description: "AWS Role to assume [required if pushing to ECR]"
        required: false

defaults:
  run:
    shell: bash

# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

jobs:
  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.images.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@feature/soci-images"
        with:
          version: ${{ inputs.version }}

      - name: Images
        id: images
        env:
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          IMAGE_VERSION: ${{ inputs.image-version }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_SPEC: ${{ inputs.dev-spec }}
          CONTEXT: ${{ inputs.context }}
        run: |
          IMAGE_VERSION="${IMAGE_VERSION#v}"
          ARGS=(--quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" --context "$CONTEXT")
          [[ -n "$IMAGE_VERSION" ]] && ARGS+=(--image-version "$IMAGE_VERSION")
          if [[ -n "$DEV_SPEC" ]]; then
            ARGS+=(--dev-spec "$DEV_SPEC")
          elif [[ -n "$DEV_VERSION" ]]; then
            DEV_SPEC_JSON=$(jq -cn --arg v "$DEV_VERSION" --arg c "$DEV_CHANNEL" \
              '{version: $v} + if $c != "" then {channel: $c} else {} end')
            ARGS+=(--dev-spec "$DEV_SPEC_JSON")
          elif [[ -n "$DEV_CHANNEL" ]]; then
            ARGS+=(--dev-channel "$DEV_CHANNEL")
          fi
          result=$(bakery ci matrix "${ARGS[@]}")
          echo "matrix=$(echo "$result" | jq --compact-output .)" >> "$GITHUB_OUTPUT"

  build:
    name: "${{ matrix.img.image }}:${{ matrix.img.version }}"
    permissions:
      contents: read
      packages: write
    needs: matrix
    runs-on: ${{ inputs.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@feature/soci-images"
        with:
          version: ${{ inputs.version }}

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@feature/soci-images"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      # Since secrets cannot be referenced in an `if` condition directly,
      # this step sets an output that we can reference later.
      - name: Filter Steps
        id: filter-steps
        env:
          HAS_DOCKER_HUB: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
          HAS_AWS_ROLE: ${{ secrets.AWS_ROLE != '' }}
        run: |
          echo "docker-hub=$HAS_DOCKER_HUB" >> "$GITHUB_OUTPUT"
          echo "ecr=$HAS_AWS_ROLE" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.push && steps.filter-steps.outputs.docker-hub == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: "posit"
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS Credentials
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59  # v6.1.3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: gha-bakery-build

      - name: Login to Amazon ECR
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
          RETRY: ${{ inputs.retry }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_SPEC: ${{ inputs.dev-spec }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          CONTEXT: ${{ inputs.context }}
          CACHE: ${{ inputs.cache }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CACHE_FLAGS=()
          if [ "$CACHE" = "true" ]; then
            CACHE_FLAGS=(--cache-registry "$REGISTRY")
          fi
          DEV_SPEC_FLAGS=()
          if [[ -n "$DEV_SPEC" ]]; then
            DEV_SPEC_FLAGS+=(--dev-spec "$DEV_SPEC")
          elif [[ -n "$DEV_VERSION" ]]; then
            DEV_SPEC_JSON=$(jq -cn --arg v "$DEV_VERSION" --arg c "$DEV_CHANNEL" \
              '{version: $v} + if $c != "" then {channel: $c} else {} end')
            DEV_SPEC_FLAGS+=(--dev-spec "$DEV_SPEC_JSON")
          fi
          bakery build --load --pull \
            --retry "$RETRY" \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            "${CACHE_FLAGS[@]}" \
            "${DEV_SPEC_FLAGS[@]}" \
            --context "$CONTEXT"

      - name: Test
        env:
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          CONTEXT: ${{ inputs.context }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            --context "$CONTEXT"

      - name: Push
        # Since this is a reusable workflow, we need to be very explicit about
        # when to push the images. We default to not pushing images, so the
        # calling workflow must explicitly request pushing images.
        if: ${{ inputs.push }}
        env:
          GIT_SHA: ${{ github.sha }}
          RETRY: ${{ inputs.retry }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_SPEC: ${{ inputs.dev-spec }}
          CONTEXT: ${{ inputs.context }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEV_SPEC_FLAGS=()
          if [[ -n "$DEV_SPEC" ]]; then
            DEV_SPEC_FLAGS+=(--dev-spec "$DEV_SPEC")
          elif [[ -n "$DEV_VERSION" ]]; then
            DEV_SPEC_JSON=$(jq -cn --arg v "$DEV_VERSION" --arg c "$DEV_CHANNEL" \
              '{version: $v} + if $c != "" then {channel: $c} else {} end')
            DEV_SPEC_FLAGS+=(--dev-spec "$DEV_SPEC_JSON")
          fi
          bakery build --push --pull \
            --retry "$RETRY" \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            "${DEV_SPEC_FLAGS[@]}" \
            --context "$CONTEXT"

  readme:
    name: Push READMEs
    permissions:
      contents: read
    if: ${{ inputs.push }}
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@feature/soci-images"
        with:
          version: ${{ inputs.version }}

      - name: Push READMEs to Docker Hub
        env:
          DOCKER_HUB_README_USERNAME: ${{ secrets.DOCKER_HUB_README_USERNAME }}
          DOCKER_HUB_README_PASSWORD: ${{ secrets.DOCKER_HUB_README_PASSWORD }}
          CONTEXT: ${{ inputs.context }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
        run: |
          bakery ci readme \
            --context "$CONTEXT" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"
