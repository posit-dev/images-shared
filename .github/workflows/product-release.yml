name: Product Release

on:
  workflow_call:
    inputs:
      version:
        description: "Product version (e.g. 2026.03.0, 2026.02.1+500.pro12, 2025.12.0-14)"
        required: true
        type: string
      images:
        description: "Space-separated list of versioned (non-matrix) image names"
        required: true
        type: string
    secrets:
      APP_ID:
        description: "GitHub App ID for creating tokens"
        required: true
      APP_PRIVATE_KEY:
        description: "GitHub App private key for creating tokens"
        required: true

# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: GitHub App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install bakery
        uses: posit-dev/images-shared/setup-bakery@main

      - name: Parse version
        id: parse
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          DISPLAY_VERSION="${VERSION%%[+-]*}"
          EDITION="${DISPLAY_VERSION%.*}"

          {
            echo "version=$VERSION"
            echo "display_version=$DISPLAY_VERSION"
            echo "edition=$EDITION"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update versions
        id: release
        env:
          IMAGES: ${{ inputs.images }}
          VERSION: ${{ steps.parse.outputs.version }}
          DISPLAY_VERSION: ${{ steps.parse.outputs.display_version }}
          EDITION: ${{ steps.parse.outputs.edition }}
        run: |
          FIRST_IMAGE=$(echo "$IMAGES" | awk '{print $1}')

          # Capture the current latest version before any modifications.
          OLD_LATEST=$(bakery get version "$FIRST_IMAGE" 2>/dev/null || true)
          OLD_DISPLAY_VERSION="${OLD_LATEST%%[+-]*}"

          for IMAGE in $IMAGES; do
            EXISTING=$(bakery get version "$IMAGE" --subpath "$EDITION" 2>/dev/null || true)

            if [ -n "$EXISTING" ]; then
              echo "Patching $IMAGE: $EXISTING -> $VERSION"
              bakery update version "$IMAGE" "$VERSION" --target-version "$EXISTING"
            else
              # Determine whether this edition should become latest.
              CURRENT_LATEST=$(bakery get version "$IMAGE" 2>/dev/null || true)
              if [ -z "$CURRENT_LATEST" ]; then
                MARK_LATEST="--mark-latest"
              else
                CURRENT_DISPLAY="${CURRENT_LATEST%%[+-]*}"
                CURRENT_EDITION="${CURRENT_DISPLAY%.*}"
                if [[ "$EDITION" > "$CURRENT_EDITION" ]]; then
                  MARK_LATEST="--mark-latest"
                else
                  MARK_LATEST="--no-mark-latest"
                fi
              fi

              echo "Creating $IMAGE: $VERSION (subpath=$EDITION, $MARK_LATEST)"
              bakery create version "$IMAGE" "$VERSION" --subpath "$EDITION" $MARK_LATEST
            fi
          done

          # Check if the latest version changed. This happens when:
          # - A new edition is created that becomes latest (2026.02.1 → 2026.03.0)
          # - The current latest edition is patched (2026.02.1 → 2026.02.2)
          # It does NOT happen when patching an older edition (2026.01.1 → 2026.01.3).
          NEW_LATEST=$(bakery get version "$FIRST_IMAGE" 2>/dev/null || true)
          NEW_DISPLAY_VERSION="${NEW_LATEST%%[+-]*}"

          if [ "$NEW_DISPLAY_VERSION" != "$OLD_DISPLAY_VERSION" ]; then
            LATEST_CHANGED=true
          else
            LATEST_CHANGED=false
          fi

          echo "latest_changed=$LATEST_CHANGED" >> "$GITHUB_OUTPUT"
          echo "old_display_version=$OLD_DISPLAY_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update READMEs
        if: steps.release.outputs.latest_changed == 'true' && steps.release.outputs.old_display_version != ''
        env:
          DISPLAY_VERSION: ${{ steps.parse.outputs.display_version }}
          EDITION: ${{ steps.parse.outputs.edition }}
          OLD_DISPLAY_VERSION: ${{ steps.release.outputs.old_display_version }}
        run: |
          OLD_EDITION="${OLD_DISPLAY_VERSION%.*}"

          # Pass 1: Replace full display version (e.g. 2026.02.0 -> 2026.03.0)
          find . -name 'README.md' -not -path './.git/*' \
            -exec sed -i "s/${OLD_DISPLAY_VERSION}/${DISPLAY_VERSION}/g" {} +

          # Pass 2: Replace edition/subpath (e.g. 2026.02 -> 2026.03)
          # Only when the edition actually changed.
          if [ "$OLD_EDITION" != "$EDITION" ]; then
            find . -name 'README.md' -not -path './.git/*' \
              -exec sed -i "s/${OLD_EDITION}/${EDITION}/g" {} +
          fi

      - name: Update Supported tags sections
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          # Regenerate the "## Supported tags" bullet list in each image's
          # README from the current bakery build plan. Skips images that lack
          # a README.md or that don't have a Supported tags section.
          #
          # Curation rules (matching the curated section style):
          # - For the latest version, emit a bullet for every (variant, OS)
          #   Containerfile. For older versions, emit only the std + primary
          #   OS Containerfile.
          # - Within each bullet's tag set, drop tags ending in "-std" (they
          #   are redundant with the bare form). For non-latest versions,
          #   also drop "<verbose-version>-ubuntu-*" tags (keep only the
          #   "<display-version>-ubuntu-*" form).
          # - Sort: newest version first; within a version, primary OS
          #   before non-primary; within an OS, std before min.
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from collections import defaultdict
          from pathlib import Path

          images = os.environ["IMAGES"].split()

          # Resolve repo URL from origin so Containerfile links are correct.
          remote = subprocess.check_output(
              ["git", "remote", "get-url", "origin"], text=True
          ).strip()
          if remote.startswith("git@github.com:"):
              remote = "https://github.com/" + remote[len("git@github.com:"):]
          if remote.endswith(".git"):
              remote = remote[:-4]

          plan_out = subprocess.check_output(["bakery", "build", "--plan"], text=True)
          plan = json.loads(plan_out[plan_out.find("{"):])
          targets = plan["target"]

          # Match the heading and the contiguous bullet block that follows it.
          # Trailing prose (e.g. "For a full list of available tags...") is
          # preserved because it is separated from the bullets by a blank line.
          bullet_re = re.compile(
              r"(?m)^(## Supported tags\s*\n\n)(?:- \[.*\n)+"
          )

          def display_version(tags):
              for t in tags:
                  m = re.match(r"^(\d{4}\.\d{2}\.\d+)", t)
                  if m:
                      return m.group(1)
              return None

          def verbose_version(tags, display):
              for t in tags:
                  m = re.match(rf"^({re.escape(display)}-\d+)(?:-|$)", t)
                  if m:
                      return m.group(1)
              return None

          def variant_of(cf):
              if cf.endswith(".std"):
                  return "std"
              if cf.endswith(".min"):
                  return "min"
              return None

          def is_primary_os(tags, display, variant):
              # The std + primary_os Containerfile owns the bare display tag;
              # the min + primary_os Containerfile owns "<display>-min". Other
              # combinations always carry an "-ubuntu-*" suffix.
              if variant == "std":
                  return display in tags
              if variant == "min":
                  return f"{display}-min" in tags
              return False

          def curate_tags(tags, is_latest_version, verbose):
              kept = []
              for t in sorted(tags):
                  if t.endswith("-std"):
                      continue
                  if not is_latest_version and verbose and t.startswith(f"{verbose}-ubuntu"):
                      continue
                  kept.append(t)
              return kept

          for image in images:
              readme = Path(image) / "README.md"
              if not readme.exists():
                  print(f"::notice::Skipping {image}: no README.md")
                  continue
              text = readme.read_text()
              if not bullet_re.search(text):
                  print(f"::notice::Skipping {image}: no Supported tags section")
                  continue

              groups: dict[str, set[str]] = defaultdict(set)
              for name, target in targets.items():
                  if not name.startswith(f"{image}-"):
                      continue
                  cf = target.get("dockerfile") or ""
                  if not cf:
                      continue
                  for tag in target.get("tags", []):
                      if not tag.startswith("docker.io/") or ":" not in tag:
                          continue
                      groups[cf].add(tag.split(":", 1)[1])

              if not groups:
                  print(f"::warning::No build plan targets found for {image}")
                  continue

              # Latest version owns the bare "latest" floating tag.
              latest_display = None
              for cf, tags in groups.items():
                  if "latest" in tags:
                      latest_display = display_version(tags)
                      break

              selected: dict[str, set[str]] = {}
              for cf, tags in groups.items():
                  disp = display_version(tags)
                  if not disp:
                      continue
                  var = variant_of(cf)
                  if disp == latest_display:
                      selected[cf] = tags
                  elif var == "std" and is_primary_os(tags, disp, "std"):
                      selected[cf] = tags

              def sort_key(cf: str):
                  tags = selected[cf]
                  disp = display_version(tags)
                  var = variant_of(cf)
                  primary = is_primary_os(tags, disp, var)
                  ver_parts = tuple(int(x) for x in disp.split("."))
                  return (
                      tuple(-x for x in ver_parts),  # newer version first
                      not primary,                    # primary OS first
                      var != "std",                   # std before min
                  )

              bullets = []
              for cf in sorted(selected, key=sort_key):
                  tags = selected[cf]
                  disp = display_version(tags)
                  verb = verbose_version(tags, disp) if disp else None
                  kept = curate_tags(tags, disp == latest_display, verb)
                  if not kept:
                      continue
                  tag_str = ", ".join(f"`{t}`" for t in kept)
                  bullets.append(f"- [{tag_str}]({remote}/blob/main/{cf})")
              new_block = "\n".join(bullets) + "\n"

              new_text = bullet_re.sub(
                  lambda m: m.group(1) + new_block, text, count=1
              )

              if new_text != text:
                  readme.write_text(new_text)
                  print(f"::notice::Updated Supported tags in {readme}")
              else:
                  print(f"::notice::No changes for {readme}")
          PY

      - name: Create pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGES: ${{ inputs.images }}
          VERSION: ${{ steps.parse.outputs.version }}
          DISPLAY_VERSION: ${{ steps.parse.outputs.display_version }}
          LATEST_CHANGED: ${{ steps.release.outputs.latest_changed }}
          OLD_DISPLAY: ${{ steps.release.outputs.old_display_version }}
        run: |
          BRANCH="release/${DISPLAY_VERSION}"
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Release ${DISPLAY_VERSION}"
          git push -u origin "$BRANCH" --force-with-lease

          BODY="Updates images to version \`${VERSION}\`."
          BODY+=$'\n\n'"**Images:** $(echo "$IMAGES" | tr ' ' ', ')"
          if [ "$LATEST_CHANGED" = "true" ]; then
            BODY+=$'\n'"**Latest changed:** \`${OLD_DISPLAY}\` → \`${DISPLAY_VERSION}\`"
          fi

          gh pr create \
            --title "Release ${DISPLAY_VERSION}" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH" || echo "PR already exists"
