on:
  workflow_dispatch:
  push:
    branches: main
    paths:
      - 'posit-bakery/**'
      - '.github/workflows/docs.yml'

name: Publish Docs

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version-file: posit-bakery/pyproject.toml
          enable-cache: false

      - name: Install docs dependencies
        working-directory: posit-bakery
        run: uv sync --group docs

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0

      - name: Generate API reference
        working-directory: posit-bakery
        run: |
          uv run --group docs great-docs build --project-path .
          rm -rf docs/reference
          cp -r great-docs/reference docs/reference
          rm -rf great-docs

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0
        with:
          target: gh-pages
          path: posit-bakery/docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
