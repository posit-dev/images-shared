on:
  workflow_dispatch:
  push:
    branches: main
    paths:
      - 'posit-bakery/**'
      - '.github/workflows/docs.yml'

name: Publish Docs

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false

      - name: Install docs dependencies
        working-directory: posit-bakery
        run: uv sync --group docs

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0

      - name: Generate API reference
        working-directory: posit-bakery
        run: |
          uv run --group docs great-docs build --project-path .
          rm -rf docs/reference
          cp -r great-docs/reference docs/reference
          rm -rf great-docs

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b  # v2.2.0
        with:
          target: gh-pages
          path: posit-bakery/docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
