# Worklows can only be nested four levels deep.
# This workflow will be called to build individual images so should be kept
# as shallow as possible.

name: Bakery

on:
  workflow_call:
    inputs:
      version:
        description: "The version of the Posit Bakery tool to install"
        default: "main"
        required: false
        type: string
      context:
        description: "The Bakery context to use (directory)"
        default: "."
        required: false
        type: string
      dev-versions:
        description: "Dev version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      matrix-versions:
        description: "Matrix version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      image-name:
        description: "Filter to a specific image name or pattern (e.g., 'workbench', '^workbench$')"
        default: ""
        required: false
        type: string
      image-version:
        description: "Filter to a specific image version. A leading 'v' is stripped automatically."
        default: ""
        required: false
        type: string
      dev-channel:
        description: "Filter dev versions to a specific release channel (e.g. 'daily', 'preview')"
        default: ""
        required: false
        type: string
      dev-stream:
        description: "Deprecated: use dev-channel instead."
        default: ""
        required: false
        type: string
      dev-version:
        description: "Pinned dev version string for a dispatched build. Used with dev-channel to construct dev-spec."
        default: ""
        required: false
        type: string
      release-branch:
        description: "Workbench dailies release branch for dev builds (e.g. 'apple-blossom', '2026.07'). Omit to use 'latest'."
        default: ""
        required: false
        type: string
      dev-spec:
        description: "JSON spec for a dispatched dev build. If set, takes precedence over dev-version/dev-channel for spec construction."
        default: ""
        required: false
        type: string
      push:
        description: "Whether to push images to registries [default: false]"
        default: false
        required: false
        type: boolean
      retry:
        description: "Number of times to retry a failed build [default: 1]"
        default: 1
        required: false
        type: number
      cache:
        description: "Whether to use registry caching for builds [default: true]"
        default: true
        required: false
        type: boolean
      merge-builder:
        description: "The type of runner to use for merging [default: ubuntu-latest-4x]"
        default: "ubuntu-latest-4x"
        required: false
        type: string
      amd64-builder:
        description: "The type of runner to use for amd64 builds [default: ubuntu-latest-4x]"
        default: "ubuntu-latest-4x"
        required: false
        type: string
      arm64-builder:
        description: "The type of runner to use for arm64 builds [default: ubuntu-24.04-arm64-4-core]"
        default: "ubuntu-24.04-arm64-4-core"
        required: false
        type: string
      aws-region:
        description: "AWS Region [default: us-east-2]"
        default: "us-east-2"
        required: false
        type: string
    secrets:
      DOCKER_HUB_ACCESS_TOKEN:
        description: "Docker Hub Access Token [required if pushing]"
        required: false
      DOCKER_HUB_README_USERNAME:
        description: "Docker Hub username for pushing READMEs (PAT required, OAT not supported)"
        required: false
      DOCKER_HUB_README_PASSWORD:
        description: "Docker Hub PAT for pushing READMEs"
        required: false
      AWS_ROLE:
        description: "AWS Role to assume [required if pushing to ECR]"
        required: false

defaults:
  run:
    shell: bash

# Security policy: No ${{ }} expressions in `run:` blocks.
# All expression values are assigned to `env:` and referenced as
# shell variables. This prevents script injection from runtime values
# (matrix outputs, secrets) and keeps the rule enforceable by zizmor
# without per-expression exceptions.

jobs:
  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      platform-matrix: ${{ steps.images-by-platform.outputs.platform_matrix }}
      image-matrix: ${{ steps.images-by-platform.outputs.image_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}
          cache-scope: ${{ toJSON(inputs) }}

      - name: Resolve dev-spec
        id: resolve-dev-spec
        env:
          DEV_SPEC: ${{ inputs.dev-spec }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          RELEASE_BRANCH: ${{ inputs.release-branch }}
        run: |
          if [[ -n "$DEV_SPEC" ]]; then
            DEV_SPEC_COMPACT=$(echo "$DEV_SPEC" | jq -c .)
            echo "dev-spec=$DEV_SPEC_COMPACT" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DEV_VERSION" || -n "$RELEASE_BRANCH" ]]; then
            DEV_SPEC_JSON=$(jq -cn \
              --arg v "$DEV_VERSION" \
              --arg c "$DEV_CHANNEL" \
              --arg b "$RELEASE_BRANCH" \
              'if $v != "" then {version: $v} else {} end
               + if $c != "" then {channel: $c} else {} end
               + if $b != "" then {release_branch: $b} else {} end')
            echo "dev-spec=$DEV_SPEC_JSON" >> "$GITHUB_OUTPUT"
          else
            echo "dev-spec=" >> "$GITHUB_OUTPUT"
          fi

      - name: Images by Version/Platform
        id: images-by-platform
        env:
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          IMAGE_NAME_FILTER: ${{ inputs.image-name }}
          IMAGE_VERSION: ${{ inputs.image-version }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          DEV_SPEC_RESOLVED: ${{ steps.resolve-dev-spec.outputs.dev-spec }}
          CONTEXT: ${{ inputs.context }}
        run: |
          IMAGE_VERSION="${IMAGE_VERSION#v}"
          ARGS=(--quiet --dev-versions "$DEV_VERSIONS" --matrix-versions "$MATRIX_VERSIONS" --context "$CONTEXT")
          [[ -n "$IMAGE_VERSION" ]] && ARGS+=(--image-version "$IMAGE_VERSION")
          if [[ -n "$DEV_SPEC_RESOLVED" ]]; then
            ARGS+=(--dev-spec "$DEV_SPEC_RESOLVED")
          elif [[ -n "$DEV_CHANNEL" ]]; then
            ARGS+=(--dev-channel "$DEV_CHANNEL")
          fi
          [[ -n "$IMAGE_NAME_FILTER" ]] && ARGS+=(-- "$IMAGE_NAME_FILTER")
          result=$(bakery ci matrix "${ARGS[@]}")
          echo "platform_matrix=$(echo "$result" | jq --compact-output .)" >> "$GITHUB_OUTPUT"
          echo "image_matrix=$(echo "$result" | jq --compact-output '[.[].image] | unique')" >> "$GITHUB_OUTPUT"

  build-test:
    name: "Build/Test ${{ matrix.img.image }}:${{ matrix.img.version }} (${{ matrix.img.platform }})"
    permissions:
      contents: read
      packages: write
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.platform-matrix) }}
    runs-on: ${{ matrix.img.platform == 'linux/arm64' && inputs.arm64-builder || inputs.amd64-builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}
          cache-scope: ${{ toJSON(inputs) }}

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Set up Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23  # v5.2.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0

      # Since secrets cannot be referenced in an `if` condition directly,
      # this step sets an output that we can reference later.
      - name: Filter Steps
        id: filter-steps
        env:
          HAS_DOCKER_HUB: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
          HAS_AWS_ROLE: ${{ secrets.AWS_ROLE != '' }}
        run: |
          echo "docker-hub=$HAS_DOCKER_HUB" >> "$GITHUB_OUTPUT"
          echo "ecr=$HAS_AWS_ROLE" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.push && steps.filter-steps.outputs.docker-hub == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: "posit"
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS Credentials
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: gha-bakery-build

      - name: Login to Amazon ECR
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64  # v2.1.6

      - name: Normalize platform
        id: normalize-platform
        env:
          BUILD_PLATFORM: ${{ matrix.img.platform }}
        run: |
          PLATFORM=${BUILD_PLATFORM#linux/}
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
      - name: Resolve dev-spec
        id: resolve-dev-spec
        env:
          DEV_SPEC: ${{ inputs.dev-spec }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          RELEASE_BRANCH: ${{ inputs.release-branch }}
        run: |
          if [[ -n "$DEV_SPEC" ]]; then
            DEV_SPEC_COMPACT=$(echo "$DEV_SPEC" | jq -c .)
            echo "dev-spec=$DEV_SPEC_COMPACT" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DEV_VERSION" || -n "$RELEASE_BRANCH" ]]; then
            DEV_SPEC_JSON=$(jq -cn \
              --arg v "$DEV_VERSION" \
              --arg c "$DEV_CHANNEL" \
              --arg b "$RELEASE_BRANCH" \
              'if $v != "" then {version: $v} else {} end
               + if $c != "" then {channel: $c} else {} end
               + if $b != "" then {release_branch: $b} else {} end')
            echo "dev-spec=$DEV_SPEC_JSON" >> "$GITHUB_OUTPUT"
          else
            echo "dev-spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
          RETRY: ${{ inputs.retry }}
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          IMAGE_PLATFORM: ${{ matrix.img.platform }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DEV_SPEC_RESOLVED: ${{ steps.resolve-dev-spec.outputs.dev-spec }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          NORMALIZED_PLATFORM: ${{ steps.normalize-platform.outputs.platform }}
          CONTEXT: ${{ inputs.context }}
          CACHE: ${{ inputs.cache }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Cache-to is conditional on --push (handled by bakery internally)
        run: |
          CACHE_FLAGS=()
          if [ "$CACHE" = "true" ]; then
            CACHE_FLAGS=(--cache-registry "$REGISTRY")
          fi
          DEV_SPEC_FLAGS=()
          [[ -n "$DEV_SPEC_RESOLVED" ]] && DEV_SPEC_FLAGS=(--dev-spec "$DEV_SPEC_RESOLVED")
          bakery build \
            --strategy build --pull \
            --retry "$RETRY" \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --image-platform "$IMAGE_PLATFORM" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            "${CACHE_FLAGS[@]}" \
            "${DEV_SPEC_FLAGS[@]}" \
            --temp-registry "$REGISTRY" \
            --metadata-file "./${IMAGE_NAME}-${IMAGE_VERSION}-${NORMALIZED_PLATFORM}-metadata.json" \
            --context "$CONTEXT" \
            --push
      - name: Test
        env:
          IMAGE_NAME: ${{ matrix.img.image }}
          IMAGE_VERSION: ${{ matrix.img.version }}
          IMAGE_PLATFORM: ${{ matrix.img.platform }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
          DEV_SPEC_RESOLVED: ${{ steps.resolve-dev-spec.outputs.dev-spec }}
          NORMALIZED_PLATFORM: ${{ steps.normalize-platform.outputs.platform }}
          CONTEXT: ${{ inputs.context }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEV_SPEC_FLAGS=()
          [[ -n "$DEV_SPEC_RESOLVED" ]] && DEV_SPEC_FLAGS=(--dev-spec "$DEV_SPEC_RESOLVED")
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery dgoss run \
            --image-name "^${IMAGE_NAME}$" \
            --image-version "$IMAGE_VERSION" \
            --image-platform "$IMAGE_PLATFORM" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS" \
            "${DEV_SPEC_FLAGS[@]}" \
            --metadata-file "./${IMAGE_NAME}-${IMAGE_VERSION}-${NORMALIZED_PLATFORM}-metadata.json" \
            --context "$CONTEXT"
      - name: Upload Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: "${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata"
          path: "./${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata.json"
          overwrite: 'true'

  merge:
    name: "Merge/Push ${{ matrix.image }}"
    permissions:
      contents: read
      packages: write
    needs: [matrix, build-test]
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.matrix.outputs.image-matrix) }}
    runs-on: ${{ inputs.merge-builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}
          cache-scope: ${{ toJSON(inputs) }}

      - name: Set up Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23  # v5.2.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      # Since secrets cannot be referenced in an `if` condition directly,
      # this step sets an output that we can reference later.
      - name: Filter Steps
        id: filter-steps
        env:
          HAS_DOCKER_HUB: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN != '' }}
          HAS_AWS_ROLE: ${{ secrets.AWS_ROLE != '' }}
        run: |
          echo "docker-hub=$HAS_DOCKER_HUB" >> "$GITHUB_OUTPUT"
          echo "ecr=$HAS_AWS_ROLE" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.push && steps.filter-steps.outputs.docker-hub == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: "posit"
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS Credentials
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: gha-bakery-build

      - name: Login to Amazon ECR
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64  # v2.1.6

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3  # v2.0.0

      - name: Setup SOCI
        uses: "posit-dev/images-shared/setup-soci@main"

      - name: Download Metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: "*-metadata"
          merge-multiple: true

      - name: List files
        run: |
          ls -ltra .

      - name: Resolve dev-spec
        id: resolve-dev-spec
        env:
          DEV_SPEC: ${{ inputs.dev-spec }}
          DEV_VERSION: ${{ inputs.dev-version }}
          DEV_CHANNEL: ${{ inputs.dev-channel || inputs.dev-stream }}
          RELEASE_BRANCH: ${{ inputs.release-branch }}
        run: |
          if [[ -n "$DEV_SPEC" ]]; then
            DEV_SPEC_COMPACT=$(echo "$DEV_SPEC" | jq -c .)
            echo "dev-spec=$DEV_SPEC_COMPACT" >> "$GITHUB_OUTPUT"
          elif [[ -n "$DEV_VERSION" || -n "$RELEASE_BRANCH" ]]; then
            DEV_SPEC_JSON=$(jq -cn \
              --arg v "$DEV_VERSION" \
              --arg c "$DEV_CHANNEL" \
              --arg b "$RELEASE_BRANCH" \
              'if $v != "" then {version: $v} else {} end
               + if $c != "" then {channel: $c} else {} end
               + if $b != "" then {release_branch: $b} else {} end')
            echo "dev-spec=$DEV_SPEC_JSON" >> "$GITHUB_OUTPUT"
          else
            echo "dev-spec=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        env:
          GIT_SHA: ${{ github.sha }}
          CONTEXT: ${{ inputs.context }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          PUSH: ${{ inputs.push }}
          IMAGE_NAME: ${{ matrix.image }}
          DEV_SPEC_RESOLVED: ${{ steps.resolve-dev-spec.outputs.dev-spec }}
        run: |
          if [ "$PUSH" = "true" ]; then PUSH_FLAG=""; else PUSH_FLAG="--dry-run"; fi
          DEV_SPEC_FLAGS=()
          [[ -n "$DEV_SPEC_RESOLVED" ]] && DEV_SPEC_FLAGS=(--dev-spec "$DEV_SPEC_RESOLVED")
          bakery ci publish \
            --context "$CONTEXT" \
            --image-name "^${IMAGE_NAME}$" \
            --temp-registry "$REGISTRY" \
            "${DEV_SPEC_FLAGS[@]}" \
            $PUSH_FLAG \
            ./*-metadata.json

  readme:
    name: Push READMEs
    permissions:
      contents: read
    if: ${{ inputs.push }}
    needs:
      - merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}
          cache-scope: ${{ toJSON(inputs) }}

      - name: Push READMEs to Docker Hub
        env:
          DOCKER_HUB_README_USERNAME: ${{ secrets.DOCKER_HUB_README_USERNAME }}
          DOCKER_HUB_README_PASSWORD: ${{ secrets.DOCKER_HUB_README_PASSWORD }}
          CONTEXT: ${{ inputs.context }}
          DEV_VERSIONS: ${{ inputs.dev-versions }}
          MATRIX_VERSIONS: ${{ inputs.matrix-versions }}
        run: |
          bakery ci readme \
            --context "$CONTEXT" \
            --dev-versions "$DEV_VERSIONS" \
            --matrix-versions "$MATRIX_VERSIONS"
