# Worklows can only be nested four levels deep.
# This workflow will be called to build individual images so should be kept
# as shallow as possible.

name: Bakery

on:
  workflow_call:
    inputs:
      version:
        description: "The version of the Posit Bakery tool to install"
        default: "main"
        required: false
        type: string
      context:
        description: "The Bakery context to use (directory)"
        default: "."
        required: false
        type: string
      dev-versions:
        description: "Dev version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      matrix-versions:
        description: "Matrix version builds [default: exclude] [options: include, exclude, only]"
        default: "exclude"
        required: false
        type: string
      push:
        description: "Whether to push images to registries [default: false]"
        default: false
        required: false
        type: boolean
      retry:
        description: "Number of times to retry a failed build [default: 1]"
        default: 1
        required: false
        type: number
      merge-builder:
        description: "The type of runner to use for merging [default: ubuntu-latest-4x]"
        default: "ubuntu-latest-4x"
        required: false
        type: string
      amd64-builder:
        description: "The type of runner to use for amd64 builds [default: ubuntu-latest-4x]"
        default: "ubuntu-latest-4x"
        required: false
        type: string
      arm64-builder:
        description: "The type of runner to use for arm64 builds [default: ubuntu-24.04-arm64-4-core]"
        default: "ubuntu-24.04-arm64-4-core"
        required: false
        type: string
      aws-region:
        description: "AWS Region [default: us-east-2]"
        default: "us-east-2"
        required: false
        type: string
    secrets:
      DOCKER_HUB_ACCESS_TOKEN:
        description: "Docker Hub Access Token [required if pushing]"
        required: false
      DOCKER_HUB_README_USERNAME:
        description: "Docker Hub username for pushing READMEs (PAT required, OAT not supported)"
        required: false
      DOCKER_HUB_README_PASSWORD:
        description: "Docker Hub PAT for pushing READMEs"
        required: false
      AWS_ROLE:
        description: "AWS Role to assume [required if pushing to ECR]"
        required: false

defaults:
  run:
    shell: bash

jobs:
  matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    outputs:
      platform-matrix: ${{ steps.images-by-platform.outputs.platform_matrix }}
      versions-matrix: ${{ steps.images-by-version.outputs.versions_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Images by Version/Platform
        id: images-by-platform
        run: |
          echo "platform_matrix=$(bakery ci matrix --quiet --dev-versions ${{ inputs.dev-versions }} --matrix-versions ${{ inputs.matrix-versions }} --context ${{ inputs.context }} | jq --compact-output .)" >> $GITHUB_OUTPUT
      - name: Images by Version
        id: images-by-version
        run: |
          echo "versions_matrix=$(bakery ci matrix --quiet --dev-versions ${{ inputs.dev-versions }} --matrix-versions ${{ inputs.matrix-versions }} --exclude platform --context ${{ inputs.context }} | jq --compact-output .)" >> $GITHUB_OUTPUT

  build-test:
    name: "Build/Test ${{ matrix.img.image }}:${{ matrix.img.version }} (${{ matrix.img.platform }})"
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.platform-matrix) }}
    runs-on: ${{ matrix.img.platform == 'linux/arm64' && inputs.arm64-builder || inputs.amd64-builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Setup goss
        uses: "posit-dev/images-shared/setup-goss@main"

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@v1

      # Since secrets cannot be referenced in an `if` condition directly,
      # this step sets an output that we can reference later.
      - name: Filter Steps
        id: filter-steps
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" ] ; then
            echo "docker-hub=true" >> $GITHUB_OUTPUT
          else
            echo "docker-hub=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "${{ secrets.AWS_ROLE }}" ] ; then
            echo "ecr=true" >> $GITHUB_OUTPUT
          else
            echo "ecr=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.push && steps.filter-steps.outputs.docker-hub == 'true' }}
        uses: docker/login-action@v4
        with:
          username: "posit"
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS Credentials
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: gha-bakery-build

      - name: Login to Amazon ECR
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Normalize platform
        id: normalize-platform
        env:
          BUILD_PLATFORM: ${{ matrix.img.platform }}
        run: |
          PLATFORM=${BUILD_PLATFORM#linux/}
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
      - name: Build
        env:
          GIT_SHA: ${{ github.sha }}
        # FIXME: Currently pushes to ghcr.io for caching. Needs to be conditional
        run: |
          PLATFORM=${BUILD_PLATFORM#linux/} \
          bakery build \
            --strategy build --pull \
            --retry ${{ inputs.retry }} \
            --image-name '^${{ matrix.img.image }}$' \
            --image-version ${{ matrix.img.version }} \
            --image-platform ${{ matrix.img.platform }} \
            --dev-versions ${{ inputs.dev-versions }} \
            --matrix-versions ${{ inputs.matrix-versions }} \
            --cache-registry "ghcr.io/${{ github.repository_owner }}" \
            --temp-registry "ghcr.io/${{ github.repository_owner }}" \
            --metadata-file "./${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata.json" \
            --context ${{ inputs.context }} \
            --push
      - name: Test
        run: |
          PLATFORM=${BUILD_PLATFORM#linux/} \
          GOSS_PATH=${GITHUB_WORKSPACE}/tools/goss \
          DGOSS_PATH=${GITHUB_WORKSPACE}/tools/dgoss \
          bakery run dgoss \
            --image-name '^${{ matrix.img.image }}$' \
            --image-version ${{ matrix.img.version }} \
            --image-platform ${{ matrix.img.platform }} \
            --dev-versions ${{ inputs.dev-versions }} \
            --matrix-versions ${{ inputs.matrix-versions }} \
            --metadata-file "./${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata.json" \
            --context ${{ inputs.context }}
      - name: Upload Metadata
        uses: actions/upload-artifact@v7
        with:
          name: "${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata"
          path: "./${{ matrix.img.image }}-${{ matrix.img.version }}-${{ steps.normalize-platform.outputs.platform }}-metadata.json"
          overwrite: 'true'

  merge:
    name: "Merge/Push ${{ matrix.img.image }}:${{ matrix.img.version }}"
    needs:
      - matrix
      - build-test
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJson(needs.matrix.outputs.versions-matrix) }}
    runs-on: ${{ inputs.merge-builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      # Since secrets cannot be referenced in an `if` condition directly,
      # this step sets an output that we can reference later.
      - name: Filter Steps
        id: filter-steps
        run: |
          if [ -n "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" ] ; then
            echo "docker-hub=true" >> $GITHUB_OUTPUT
          else
            echo "docker-hub=false" >> $GITHUB_OUTPUT
          fi

          if [ -n "${{ secrets.AWS_ROLE }}" ] ; then
            echo "ecr=true" >> $GITHUB_OUTPUT
          else
            echo "ecr=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ inputs.push && steps.filter-steps.outputs.docker-hub == 'true' }}
        uses: docker/login-action@v4
        with:
          username: "posit"
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Configure AWS Credentials
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ inputs.aws-region }}
          role-session-name: gha-bakery-build

      - name: Login to Amazon ECR
        if: ${{ inputs.push && steps.filter-steps.outputs.ecr == 'true' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup ORAS CLI
        uses: oras-project/setup-oras@v1

      - name: Download Metadata
        uses: actions/download-artifact@v8
        with:
          pattern: "${{ matrix.img.image }}-${{ matrix.img.version }}-*-metadata"
          merge-multiple: true

      - name: List files
        run: |
          ls -ltra .

      - name: Merge/Push
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          bakery ci merge \
            --context ${{ inputs.context }} \
            --temp-registry "ghcr.io/${{ github.repository_owner }}" \
            ${{ inputs.push && ' \' || '--dry-run \' }}
            *-metadata.json

  readme:
    name: Push READMEs
    if: ${{ inputs.push }}
    needs:
      - merge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bakery
        uses: "posit-dev/images-shared/setup-bakery@main"
        with:
          version: ${{ inputs.version }}

      - name: Push READMEs to Docker Hub
        env:
          DOCKER_HUB_README_USERNAME: ${{ secrets.DOCKER_HUB_README_USERNAME }}
          DOCKER_HUB_README_PASSWORD: ${{ secrets.DOCKER_HUB_README_PASSWORD }}
        run: |
          bakery ci readme \
            --context ${{ inputs.context }} \
            --dev-versions ${{ inputs.dev-versions }} \
            --matrix-versions ${{ inputs.matrix-versions }}
