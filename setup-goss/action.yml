name: 'Setup goss and dgoss'
description: 'Installs goss and dgoss to tools/'

inputs:
  version:
    description: "The goss release version to install"
    required: false
    default: "latest"
  architecture:
    description: "The system architecture (e.g., amd64, arm64). If not set, it will be detected automatically."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Make tools directory
      shell: bash
      run: mkdir -p tools
    - name: Install goss
      shell: bash
      run: |
        # Determine architecture if not provided
        arch="${{ inputs.architecture }}"
        if [ -z "$arch" ]; then
          arch=$(uname -m)
        fi

        # Map architecture names to goss naming conventions
        if [ "$arch" = "x86_64" ]; then
            arch="amd64"
        elif [ "$arch" = "aarch64" ]; then
            arch="arm64"
        fi

        release_url="https://github.com/goss-org/goss/releases/${{ inputs.version }}/download"
        binary="goss-linux-${arch}"

        curl -fsSL "${release_url}/${binary}" -o "tools/${binary}"

        curl -fsSL "${release_url}/${binary}.sha256" -o "tools/${binary}.sha256"
        (cd tools && sha256sum -c "${binary}.sha256")
        rm -f "tools/${binary}.sha256"

        mv "tools/${binary}" tools/goss
        chmod +rx tools/goss
    - name: Install dgoss
      shell: bash
      run: |
        release_url="https://github.com/goss-org/goss/releases/${{ inputs.version }}/download"

        curl -fsSL "${release_url}/dgoss" -o tools/dgoss

        curl -fsSL "${release_url}/dgoss.sha256" -o tools/dgoss.sha256
        (cd tools && sha256sum -c dgoss.sha256)
        rm -f tools/dgoss.sha256

        chmod +rx tools/dgoss
