package:
  ca-certificates:
    installed: true
  curl:
    installed: true
  git:
    installed: true
  cmake:
    installed: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
  xz-utils:
    installed: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
  quarto:
    installed: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
    versions:
      - 1.8.27

file:
  python-3.13.7:
    exists: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
    path: /opt/python/3.13.7
  r-4.5.1:
    exists: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
    path: /opt/R/4.5.1
  quarto:
    exists: {{ if eq .Env.IMAGE_VARIANT "Minimal" }}false{{ else }}true{{ end }}
    path: /opt/quarto/bin/quarto
