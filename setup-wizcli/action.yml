name: 'Setup wizcli'
description: 'Installs wizcli to tools/'

inputs:
  architecture:
    description: "The system architecture (e.g., amd64, arm64). If not set, it will be detected automatically."
    required: false
    default: ""
  base_path:
    description: "The base path to install wizcli (default: CWD)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Make tools directory
      shell: bash
      env:
        BASE_PATH: ${{ inputs.base_path }}
      run: mkdir -p "$BASE_PATH/tools"
    - name: Install wizcli
      shell: bash
      env:
        INPUT_ARCH: ${{ inputs.architecture }}
        BASE_PATH: ${{ inputs.base_path }}
      run: |
        # Determine architecture if not provided
        arch="$INPUT_ARCH"
        if [ -z "$arch" ]; then
          arch=$(uname -m)
        fi

        # Map architecture names
        if [ "$arch" = "x86_64" ]; then
            arch="amd64"
        elif [ "$arch" = "aarch64" ]; then
            arch="arm64"
        fi

        curl -fsSL "https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-${arch}" -o "$BASE_PATH/tools/wizcli"
        chmod +rx "$BASE_PATH/tools/wizcli"
